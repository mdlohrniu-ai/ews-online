<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EWS Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-mute: #8888aa;
    --paper: #faf9f6;
    --paper-2: #f2f0eb;
    --paper-3: #e8e5de;
    --accent: #2e5ba8;
    --accent-lt: #dde7f7;
    --red: #b03030;
    --red-lt: #fce8e8;
    --green: #2a7a4e;
    --green-lt: #e3f3ea;
    --rule: rgba(26,26,46,0.10);
    --shadow: 0 2px 16px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }
  header {
    background: var(--ink);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 600;
    color: #fff;
  }
  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .logout-btn {
    font-size: 12px; color: rgba(255,255,255,0.6);
    background: none; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 6px 14px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: none;
  }
  .logout-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  /* ── LOGIN ── */
  .login-card {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 16px;
    padding: 48px;
    max-width: 400px;
    margin: 0 auto;
    box-shadow: var(--shadow);
  }
  .login-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    margin-bottom: 8px;
  }
  .login-card .subtitle {
    font-size: 13px;
    color: var(--ink-mute);
    margin-bottom: 28px;
  }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: block;
  }
  .field { margin-bottom: 16px; }
  .text-input {
    width: 100%;
    height: 48px;
    border: 1.5px solid var(--paper-3);
    border-radius: 10px;
    padding: 0 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.04em;
  }
  .text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-lt);
  }
  .login-btn {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .login-btn:hover { background: #1f4690; }
  .login-btn:active { transform: scale(0.99); }
  .login-btn:disabled { background: var(--paper-3); color: var(--ink-mute); cursor: default; }

  .msg {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
  .msg.error { background: var(--red-lt); color: var(--red); border: 1px solid #f5c0c0; }
  .msg.show  { display: block; }

  /* ── TILES ── */
  #tiles-panel { display: none; }
  .greeting {
    margin-bottom: 32px;
  }
  .greeting h2 {
    font-family: 'Fraunces', serif;
    font-size: 24px; font-weight: 600;
  }
  .greeting p {
    font-size: 13px; color: var(--ink-mute); margin-top: 4px;
  }
  .badge {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--ink);
    color: #fff;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }

  .tiles {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .tile {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 22px 26px;
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .tile:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .tile-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent-lt);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .tile-text { flex: 1; min-width: 0; }
  .tile-title {
    font-family: 'Fraunces', serif;
    font-size: 16px; font-weight: 600;
    margin-bottom: 2px;
  }
  .tile-desc {
    font-size: 13px; color: var(--ink-mute);
  }
  .tile-arrow {
    color: var(--ink-mute);
    font-size: 1rem;
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .tile:hover .tile-arrow { color: var(--accent); transform: translateX(3px); }
  .tile.disabled {
    cursor: default;
    opacity: 0.55;
  }
  .tile.disabled:hover {
    border-color: var(--rule);
    transform: none;
  }
  .tile.success {
    background: var(--green-lt);
    border-color: var(--green);
  }
  .tile.success:hover {
    border-color: var(--green);
  }
  .tile-status {
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    margin-top: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    max-width: 380px; width: 100%;
    box-shadow: var(--shadow);
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 600;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 13px; color: var(--ink-mute);
    margin-bottom: 20px;
  }
  .modal-btn-row {
    display: flex; gap: 10px; margin-top: 8px;
  }
  .modal-btn-row .login-btn { margin-top: 0; }
  .cancel-btn {
    flex-shrink: 0;
    height: 48px;
    padding: 0 18px;
    background: none;
    border: 1.5px solid var(--paper-3);
    border-radius: 10px;
    color: var(--ink-soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .cancel-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
  .modal-submit-status {
    font-size: 13px;
    color: #2a7a4e;
    margin-top: 12px;
    text-align: center;
    min-height: 18px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  @media (max-width: 600px) {
    header { padding: 20px; }
    .login-card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-mark">EWS</div>
    <div class="header-text">
      <h1>Student Dashboard</h1>
      <p>One login, everything in one place</p>
    </div>
  </div>
  <button class="logout-btn" id="logout-btn" onclick="doLogout()">Sign out</button>
</header>

<main>

  <!-- LOGIN -->
  <div id="login-panel">
    <div class="login-card fade-in">
      <h2>Sign in</h2>
      <p class="subtitle">Enter your student number to begin.</p>

      <div class="field">
        <label class="field-label" for="num-input">Student Number</label>
        <input class="text-input" type="text" id="num-input" placeholder="e.g. 2511003" autocomplete="off" inputmode="numeric">
      </div>

      <div class="field" id="password-field" style="display:none">
        <label class="field-label" for="pw-input">Password</label>
        <input class="text-input" type="password" id="pw-input" placeholder="Your password" autocomplete="off">
      </div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">Continue →</button>
      <div class="msg" id="login-msg"></div>
      <div style="text-align:center; margin-top:20px; font-size:11px; color:var(--ink-mute); font-family:'DM Sans',sans-serif; letter-spacing:0.06em;">v1.7</div>
    </div>
  </div>

  <!-- TILES -->
  <div id="tiles-panel">
    <div class="greeting fade-in">
      <h2 id="greeting-name"></h2>
      <p>Choose what you'd like to open.</p>
      <span class="badge" id="greeting-class"></span>
    </div>

    <div class="tiles fade-in" id="tiles-container"></div>
  </div>

  <!-- GRAMMAR UNIT SUBMISSION MODAL -->
  <div class="modal-overlay" id="grammar-modal-overlay">
    <div class="modal">
      <h3>Submit Grammar Unit</h3>
      <p class="modal-sub" id="grammar-modal-week">Loading…</p>

      <div id="grammar-fields-wrap">
        <div class="field">
          <label class="field-label" for="grammar-main-input">Main Unit</label>
          <input class="text-input" id="grammar-main-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 12" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="grammar-bonus-input">Bonus Unit (optional)</label>
          <input class="text-input" id="grammar-bonus-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="optional" autocomplete="off">
        </div>
      </div>

      <div class="msg" id="grammar-modal-msg"></div>

      <div class="modal-btn-row">
        <button class="login-btn" id="grammar-submit-btn" onclick="submitGrammarUnit()">Submit →</button>
        <button class="cancel-btn" id="grammar-cancel-btn" onclick="closeGrammarModal()">Cancel</button>
      </div>
      <div id="grammar-submit-status" class="modal-submit-status"></div>
    </div>
  </div>

</main>

<script>
// ════════════════════════════════════════════════════════
//  CONFIGURATION
// ════════════════════════════════════════════════════════

// Paste the Web App URL from the Master Login Apps Script here:
const MASTER_LOGIN_URL = 'https://script.google.com/macros/s/AKfycbys09mRRw7bocSfAmEk1D7U7o9JQ1XJxGWk_NyOBEq62HKyQ6jspO_uTKbNt9lHMcsEgQ/exec';

// Tool URLs — edit these if a tool's address ever changes
const TOOL_URLS = {
  typingCheck:  'https://mdlohrniu-ai.github.io/typing-check/',
  blogAnalysis: 'https://mdlohrniu-ai.github.io/ews-grammar-analysis/',
  quizByClass: {
    'EWSI':   'https://mdlohrniu-ai.github.io/grammarquiz/',
    'EWSII':  'https://mdlohrniu-ai.github.io/grammarquizEWSII/',
    'EWSIII': 'https://mdlohrniu-ai.github.io/grammarquizEWSIII/'
  }
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let currentStudent = null; // { studentNumber, nameEng, nameJpn, className }

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function showMsg(text) {
  const el = document.getElementById('login-msg');
  el.textContent = text;
  el.className = 'msg error show';
}
function hideMsg() {
  document.getElementById('login-msg').className = 'msg';
}
function setLoading(loading) {
  const btn = document.getElementById('login-btn');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Checking…' : 'Continue →';
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('num-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ════════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════════
async function doLogin() {
  const num = document.getElementById('num-input').value.trim();
  const pw  = document.getElementById('pw-input').value.trim();

  if (!num) { showMsg('Please enter your student number.'); return; }

  hideMsg();
  setLoading(true);

  try {
    const params = new URLSearchParams({ action: 'login', studentNumber: num });
    if (pw) params.set('password', pw);

    const res = await fetch(MASTER_LOGIN_URL + '?' + params.toString());
    const data = await res.json();

    setLoading(false);

    if (data.error) {
      showMsg(data.error);
      return;
    }

    if (data.requiresPassword) {
      document.getElementById('password-field').style.display = 'block';
      document.getElementById('pw-input').focus();
      if (pw) showMsg('Incorrect password.');
      else showMsg('This account is password-protected. Please enter your password.');
      return;
    }

    if (data.ok) {
      currentStudent = data;
      showTiles();
    }
  } catch (err) {
    setLoading(false);
    showMsg('Connection error. Please try again.');
  }
}

function doLogout() {
  currentStudent = null;
  document.getElementById('num-input').value = '';
  document.getElementById('pw-input').value = '';
  document.getElementById('password-field').style.display = 'none';
  hideMsg();
  document.getElementById('login-panel').style.display = 'block';
  document.getElementById('tiles-panel').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  TILES
// ════════════════════════════════════════════════════════
function showTiles() {
  document.getElementById('greeting-name').textContent =
    'Welcome, ' + (currentStudent.nameEng || currentStudent.studentNumber).split(' ')[0] + '!';
  document.getElementById('greeting-class').textContent = currentStudent.className || '';

  const quizUrl = TOOL_URLS.quizByClass[currentStudent.className] || null;

  const studentParam = encodeURIComponent(currentStudent.studentNumber);

  const tiles = [];

  tiles.push({
    icon: '⌨',
    title: 'Typing Check',
    desc: 'Timed typing exercise — speed and accuracy.',
    url: TOOL_URLS.typingCheck + '?student=' + studentParam
  });

  if (quizUrl) {
    const win = currentStudent.quizWindow; // null = no schedule set, always open
    const isLocked = win && !win.isOpen;

    if (isLocked) {
      tiles.push({
        icon: '✎',
        title: 'Weekly Grammar Quiz',
        desc: 'Opens ' + win.day + ', ' + win.start + '\u2013' + win.end + '.',
        url: null
      });
    } else {
      const openNote = win ? ' (open until ' + win.end + ')' : '';
      tiles.push({
        icon: '✎',
        title: 'Weekly Grammar Quiz',
        desc: 'Your class\u2019s grammar quiz (' + currentStudent.className + ')' + openNote + '.',
        url: quizUrl + '?student=' + studentParam
      });
    }

    // Submit Grammar Unit — opens an in-page form instead of a link
    const gwin = currentStudent.grammarWindow; // null = no schedule set, always open
    const gLocked = gwin && !gwin.isOpen;
    if (gLocked) {
      tiles.push({
        icon: '\u270E',
        title: 'Submit Grammar Unit',
        desc: 'Opens ' + gwin.openDay + ' ' + gwin.openTime + '.',
        url: null
      });
    } else {
      const gsub = currentStudent.grammarSubmission;
      const tile = {
        icon: '\u270E',
        title: 'Submit Grammar Unit',
        desc: 'Choose the unit you want to study this week.',
        onclick: 'openGrammarSubmitModal()'
      };
      if (gsub && gsub.submittedAt) {
        tile.success = true;
        tile.statusText = '\u2713 Submitted ' + gsub.submittedAt;
      }
      tiles.push(tile);
    }
  } else {
    tiles.push({
      icon: '✎',
      title: 'Weekly Grammar Quiz',
      desc: 'No quiz found for class "' + (currentStudent.className || 'unknown') + '". Ask your teacher.',
      url: null
    });
  }

  tiles.push({
    icon: '✍',
    title: 'Blog Grammar Analysis',
    desc: 'View grammar feedback on your blog entries.',
    url: TOOL_URLS.blogAnalysis + '?student=' + studentParam
  });

  const container = document.getElementById('tiles-container');
  container.innerHTML = tiles.map(function(t) {
    const statusHtml = t.statusText ? '<div class="tile-status">' + escHtml(t.statusText) + '</div>' : '';
    const successClass = t.success ? ' success' : '';

    if (t.onclick) {
      return '<div class="tile' + successClass + '" onclick="' + t.onclick + '">' +
        '<div class="tile-icon">' + t.icon + '</div>' +
        '<div class="tile-text"><div class="tile-title">' + escHtml(t.title) + '</div>' +
        '<div class="tile-desc">' + escHtml(t.desc) + '</div>' + statusHtml + '</div>' +
        '<div class="tile-arrow">→</div>' +
        '</div>';
    }
    if (!t.url) {
      return '<div class="tile disabled">' +
        '<div class="tile-icon">' + t.icon + '</div>' +
        '<div class="tile-text"><div class="tile-title">' + escHtml(t.title) + '</div>' +
        '<div class="tile-desc">' + escHtml(t.desc) + '</div></div>' +
        '</div>';
    }
    return '<a class="tile' + successClass + '" href="' + t.url + '" target="_blank" rel="noopener">' +
      '<div class="tile-icon">' + t.icon + '</div>' +
      '<div class="tile-text"><div class="tile-title">' + escHtml(t.title) + '</div>' +
      '<div class="tile-desc">' + escHtml(t.desc) + '</div>' + statusHtml + '</div>' +
      '<div class="tile-arrow">→</div>' +
      '</a>';
  }).join('');

  document.getElementById('login-panel').style.display = 'none';
  document.getElementById('tiles-panel').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'inline-block';
}

// ════════════════════════════════════════════════════════
//  GRAMMAR UNIT SUBMISSION MODAL
// ════════════════════════════════════════════════════════
function showGrammarModalMsg(text) {
  const el = document.getElementById('grammar-modal-msg');
  el.textContent = text;
  el.className = 'msg error show';
}
function hideGrammarModalMsg() {
  document.getElementById('grammar-modal-msg').className = 'msg';
}

async function openGrammarSubmitModal() {
  document.getElementById('grammar-modal-overlay').classList.add('show');
  hideGrammarModalMsg();
  document.getElementById('grammar-submit-status').textContent = '';
  document.getElementById('grammar-main-input').value = '';
  document.getElementById('grammar-bonus-input').value = '';
  const btn = document.getElementById('grammar-submit-btn');
  btn.textContent = 'Submit →';
  document.getElementById('grammar-cancel-btn').textContent = 'Cancel';
  document.getElementById('grammar-modal-week').textContent = 'Loading…';
  btn.style.display = 'inline-block';
  btn.disabled = true;
  setGrammarFormBusy(true);

  try {
    const params = new URLSearchParams({
      action: 'getGrammarSubmission',
      studentNumber: currentStudent.studentNumber,
      className: currentStudent.className
    });
    const res = await fetch(MASTER_LOGIN_URL + '?' + params.toString());
    const data = await res.json();

    if (data.error) {
      document.getElementById('grammar-modal-week').textContent = '';
      showGrammarModalMsg(data.error);
      btn.style.display = 'none';
      return;
    }

    currentStudent.grammarWindow = data.grammarWindow; // keep tile state fresh for next render
    currentStudent.grammarSubmission = { week: data.week, submittedAt: data.submittedAt };
    const win = data.grammarWindow;

    if (win && !win.isOpen) {
      document.getElementById('grammar-modal-week').textContent =
        'Submission is closed. Opens again ' + win.openDay + ' ' + win.openTime + '.';
      btn.style.display = 'none';
      return;
    }

    btn.disabled = false;
    document.getElementById('grammar-modal-week').textContent = data.week ? ('Week ' + data.week) : 'Choose your unit for this week.';
    document.getElementById('grammar-main-input').value = data.mainUnit || '';
    document.getElementById('grammar-bonus-input').value = data.bonusUnit || '';
  } catch (err) {
    document.getElementById('grammar-modal-week').textContent = '';
    showGrammarModalMsg('Connection error. Please try again.');
    btn.style.display = 'none';
  } finally {
    setGrammarFormBusy(false);
  }
}

function closeGrammarModal() {
  document.getElementById('grammar-modal-overlay').classList.remove('show');
}

function setGrammarFormBusy(busy) {
  const wrap = document.getElementById('grammar-fields-wrap');
  const cancelBtn = document.getElementById('grammar-cancel-btn');
  wrap.style.opacity = busy ? '0.5' : '1';
  wrap.style.pointerEvents = busy ? 'none' : 'auto';
  document.getElementById('grammar-main-input').disabled = busy;
  document.getElementById('grammar-bonus-input').disabled = busy;
  cancelBtn.disabled = busy;
  cancelBtn.style.opacity = busy ? '0.5' : '1';
}

async function submitGrammarUnit() {
  const main = document.getElementById('grammar-main-input').value.trim();
  const bonus = document.getElementById('grammar-bonus-input').value.trim();
  if (!main) { showGrammarModalMsg('Please enter a unit number.'); return; }

  hideGrammarModalMsg();
  setGrammarFormBusy(true);
  const btn = document.getElementById('grammar-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Submitting…';

  try {
    const params = new URLSearchParams({
      action: 'submitGrammarUnit',
      studentNumber: currentStudent.studentNumber,
      studentName: currentStudent.nameEng,
      className: currentStudent.className,
      mainUnit: main,
      bonusUnit: bonus
    });
    const res = await fetch(MASTER_LOGIN_URL + '?' + params.toString());
    const data = await res.json();

    setGrammarFormBusy(false);
    btn.disabled = false;
    btn.textContent = 'Submit →';

    if (data.error) { showGrammarModalMsg(data.error); return; }

    if (data.ok) {
      document.getElementById('grammar-submit-status').textContent = '✓ Submitted: ' + (data.savedAt || '');
      document.getElementById('grammar-cancel-btn').textContent = 'Close';
      currentStudent.grammarSubmission = { week: data.week, submittedAt: data.savedAt };
      showTiles(); // refresh tile descriptions in case anything changed
    }
  } catch (err) {
    setGrammarFormBusy(false);
    btn.disabled = false;
    btn.textContent = 'Submit →';
    showGrammarModalMsg('Connection error. Please try again.');
  }
}
</script>
